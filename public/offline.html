<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hors ligne — STF Back-office</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      color: #16305c;
      font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      text-align: center;
      padding: 24px;
    }
    .card { max-width: 26rem; }
    img { width: 64px; height: 64px; border-radius: 16px; margin-bottom: 20px; }
    h1 { font-size: 1.5rem; margin: 0 0 12px; }
    p { color: #475569; line-height: 1.5; }
    button {
      margin-top: 24px;
      border: none;
      border-radius: 9999px;
      background: #f5941f;
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 12px 28px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/icons/icon-192.png" alt="STF" />
    <h1>Vous êtes hors ligne</h1>
    <p>Le back-office nécessite une connexion internet. Vérifiez votre connexion et réessayez.</p>
    <button onclick="location.reload()">Réessayer</button>
  </div>
</body>
</html>
